<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>voxeled — viewer</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #dfe6f3; }
  canvas { display: block; }
  #hud { position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(10,14,24,0.82); backdrop-filter: blur(8px);
    border: 1px solid rgba(120,150,210,0.22); border-radius: 12px;
    padding: 12px 15px; width: 250px; font-size: 12.5px; line-height: 1.55;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  #hud h1 { font-size: 12px; margin: 0 0 8px; letter-spacing: .4px; color: #ff5e87;
    font-weight: 700; text-transform: uppercase; }
  #hud .row { display: flex; justify-content: space-between; gap: 10px; }
  #hud .row span:first-child { color: #8da0c2; }
  #hud .row span:last-child { color: #eef3ff; font-variant-numeric: tabular-nums; }
  #hud .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#ffcf4d; margin-right:6px; }
  #hud .dot.live { background:#69e08f; }
  #hud hr { border: none; border-top: 1px solid rgba(120,150,210,0.16); margin: 10px 0 8px; }
  #xf .lbl { display:flex; justify-content:space-between; gap:8px; font-size:11px; margin-bottom:5px; }
  #xf .lbl b { color:#eef3ff; font-weight:600; }
  #xf .lbl .a { color:#ff8fb0; } #xf .lbl .b { color:#8fd0ff; }
  #xf input[type=range] { width:100%; accent-color:#ff5e87; margin:2px 0 8px; }
  #xf button { width:100%; cursor:pointer; font-size:11.5px; color:#dfe6f3;
    background:rgba(120,150,210,0.14); border:1px solid rgba(120,150,210,0.3);
    border-radius:8px; padding:5px 8px; }
  #xf button.on { background:#ff5e87; border-color:#ff5e87; color:#1a0410; font-weight:700; }
  #help { position: fixed; bottom: 10px; left: 12px; z-index: 10; color: #56688a; font-size: 11px; }
</style>
<script type="importmap">
{ "imports": {
  "three": "./vendor/three.module.js"
} }
</script>
</head>
<body>
<div id="hud">
  <h1>♥ voxeled viewer</h1>
  <div class="row"><span>Scene</span><span id="h-name">—</span></div>
  <div class="row"><span>Instances</span><span id="h-inst">—</span></div>
  <div class="row"><span>Pixels</span><span id="h-count">—</span></div>
  <div class="row"><span>Bus</span><span id="h-bus"><span class="dot" id="h-dot"></span>waiting…</span></div>
  <div class="row"><span>Frames/s</span><span id="h-fps">—</span></div>
  <hr/>
  <div id="xf">
    <div class="lbl"><span class="a">◂ <b id="xf-a">A</b></span><span class="b"><b id="xf-b">B</b> ▸</span></div>
    <input id="xf-slider" type="range" min="0" max="1" step="0.005" value="0" />
    <button id="xf-auto" class="on">⟳ Auto-crossfade</button>
  </div>
</div>
<div id="help">drag orbit · scroll zoom · <b>N</b> normals · <b>[</b> <b>]</b> crossfade · <b>A</b> auto</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "./vendor/OrbitControls.js";

const $ = (id) => document.getElementById(id);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene3 = new THREE.Scene();
scene3.background = new THREE.Color(0x05060a);
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 500000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

let mesh = null, normalsLines = null, N = 0;
// Dim idle colour so the heart's shape is faintly visible even before any frame arrives —
// lets you tell "geometry didn't load" apart from "no frames on the bus".
const OFF = new THREE.Color(0x1a2138);

async function boot() {
  const scene = await (await fetch("scene.json")).json();
  const px = scene.pixels;
  N = px.length;
  $("h-name").textContent = scene.name;
  $("h-count").textContent = N.toLocaleString();
  $("h-inst").textContent = scene.meta?.instances?.length ?? 1;
  const show = scene.meta?.show;
  if (show?.scenes?.length >= 2) { $("xf-a").textContent = show.scenes[0]; $("xf-b").textContent = show.scenes[1]; }
  if (show?.single) document.getElementById("xf").style.opacity = 0.35;

  // Bounds → LED size + camera framing.
  const lo = [Infinity, Infinity, Infinity], hi = [-Infinity, -Infinity, -Infinity];
  for (const p of px) for (let k = 0; k < 3; k++) { lo[k] = Math.min(lo[k], p.p[k]); hi[k] = Math.max(hi[k], p.p[k]); }
  const size = [hi[0]-lo[0], hi[1]-lo[1], hi[2]-lo[2]];
  const center = new THREE.Vector3((lo[0]+hi[0])/2, (lo[1]+hi[1])/2, (lo[2]+hi[2])/2);
  const diag = Math.hypot(...size);
  // Size each LED box off the real pixel PITCH (mm spacing), not the rig extent — otherwise
  // adding/spacing instances inflates the boxes and they overlap. ~0.5·pitch reads as distinct
  // dots with a gap. Fall back to a small fraction of the scene only if pitch is unknown.
  const pitch = scene.meta?.pitchMM;
  const ledSize = pitch ? pitch * 0.5 : diag / 400;

  const geo = new THREE.BoxGeometry(ledSize, ledSize, ledSize);
  const mat = new THREE.MeshBasicMaterial({ toneMapped: false });
  mesh = new THREE.InstancedMesh(geo, mat, N);
  const dummy = new THREE.Object3D();
  for (let i = 0; i < N; i++) {
    dummy.position.set(px[i].p[0], px[i].p[1], px[i].p[2]);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    mesh.setColorAt(i, OFF);
  }
  mesh.instanceMatrix.needsUpdate = true;
  mesh.instanceColor.needsUpdate = true;
  scene3.add(mesh);

  // Normal quills (toggle with N) — the visual proof the emission directions are right.
  const nGeo = new THREE.BufferGeometry();
  const pos = new Float32Array(N * 6);
  const qlen = ledSize * 3;
  for (let i = 0; i < N; i++) {
    const p = px[i].p, n = px[i].n;
    pos.set([p[0], p[1], p[2], p[0]+n[0]*qlen, p[1]+n[1]*qlen, p[2]+n[2]*qlen], i * 6);
  }
  nGeo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  normalsLines = new THREE.LineSegments(nGeo, new THREE.LineBasicMaterial({ color: 0x3a6ea5, transparent: true, opacity: 0.5 }));
  normalsLines.visible = false;
  scene3.add(normalsLines);

  // Frame the camera.
  camera.up.set(0, 1, 0);
  camera.position.set(center.x, center.y, center.z + diag * 1.1);
  controls.target.copy(center);
  controls.update();

  connectBus();
  console.log("VOXELED_READY", N); // headless render gate looks for this
}

// ── the normalized pixel bus ──────────────────────────────────────────────────
const tmp = new THREE.Color();
let frameCount = 0, lastFpsT = performance.now();

function connectBus() {
  const ws = new WebSocket(`ws://${location.host}/bus`);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => { $("h-dot").classList.add("live"); $("h-bus").lastChild.textContent = "live"; };
  ws.onclose = () => { $("h-dot").classList.remove("live"); $("h-bus").lastChild.textContent = "closed"; setTimeout(connectBus, 1000); };
  ws.onmessage = (ev) => {
    if (!mesh) return;
    const d = new Uint8Array(ev.data);
    const n = Math.min(N, (d.length / 3) | 0);
    for (let i = 0; i < n; i++) {
      tmp.setRGB(d[i*3]/255, d[i*3+1]/255, d[i*3+2]/255);
      mesh.setColorAt(i, tmp);
    }
    mesh.instanceColor.needsUpdate = true;
    frameCount++;
  };
}

// ── crossfade control → hub /control ─────────────────────────────────────────
const slider = $("xf-slider"), autoBtn = $("xf-auto");
let lastSend = 0, pendingT = null;
function sendControl(qs) {
  const now = performance.now();
  if (now - lastSend < 60) { clearTimeout(pendingT); pendingT = setTimeout(() => sendControl(qs), 60); return; }
  lastSend = now;
  fetch("/control?" + qs).catch(() => {});
}
function goManual() {
  autoBtn.classList.remove("on");
  sendControl(`mode=manual&a=0&b=1&fader=${slider.value}`);
}
slider.addEventListener("input", goManual);
autoBtn.addEventListener("click", () => {
  const on = !autoBtn.classList.contains("on");
  autoBtn.classList.toggle("on", on);
  if (on) sendControl("mode=auto"); else goManual();
});

addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "n" && normalsLines) normalsLines.visible = !normalsLines.visible;
  else if (k === "[") { slider.value = Math.max(0, +slider.value - 0.05); goManual(); }
  else if (k === "]") { slider.value = Math.min(1, +slider.value + 0.05); goManual(); }
  else if (k === "a") autoBtn.click();
});

function loop() {
  requestAnimationFrame(loop);
  controls.update();
  const now = performance.now();
  if (now - lastFpsT > 500) {
    $("h-fps").textContent = Math.round((frameCount * 1000) / (now - lastFpsT));
    frameCount = 0; lastFpsT = now;
  }
  renderer.render(scene3, camera);
}
loop();
boot().catch((e) => { $("h-name").textContent = "load error"; console.error("VOXELED_ERROR", e); });
</script>
</body>
</html>
