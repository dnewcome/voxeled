# voxeled layout — a 3×3 matrix of Möbius hearts in one shared world space.
#   run with:  VOX_LAYOUT=examples/mobius-heart/layouts/grid-3x3.yaml npm run demo
# Hearts are ~1277 mm wide × 1109 mm tall; grid pitch 1700 × 1500 mm leaves a clean gap.
# A slightly coarser pixel pitch (12 mm) keeps 9 hearts to ~28.8k pixels.
name: grid-3x3
units: mm

fixtures:
  heart:
    type: mobius-heart
    params: { panelsPerSide: 8, pitchMM: 12, twist: mobius }

instances:
  - { fixture: heart, name: r0c0, pos: [-1700,  1500, 0] }
  - { fixture: heart, name: r0c1, pos: [    0,  1500, 0] }
  - { fixture: heart, name: r0c2, pos: [ 1700,  1500, 0] }
  - { fixture: heart, name: r1c0, pos: [-1700,     0, 0] }
  - { fixture: heart, name: r1c1, pos: [    0,     0, 0] }
  - { fixture: heart, name: r1c2, pos: [ 1700,     0, 0] }
  - { fixture: heart, name: r2c0, pos: [-1700, -1500, 0] }
  - { fixture: heart, name: r2c1, pos: [    0, -1500, 0] }
  - { fixture: heart, name: r2c2, pos: [ 1700, -1500, 0] }

show:
  holdS: 3.5
  fadeS: 2.5
  scenes:
    - { name: chase (per-heart),      pattern: ribbonChase }
    - { name: wipe → across (world),  pattern: worldWipe, params: { axis: 0, space: world, speedMM: 1200, spacingMM: 2600 } }
    - { name: wipe ↑ up (world),      pattern: worldWipe, params: { axis: 1, space: world, speedMM: 1000, spacingMM: 2200, hue: 0.75 } }
    - { name: normals,                pattern: normalRGB }
